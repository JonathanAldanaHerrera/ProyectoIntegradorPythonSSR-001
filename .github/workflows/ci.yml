name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests & calidad de código
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ruff black mypy pytest-cov

      - name: Instalar tk (headless para tests sin display)
        run: sudo apt-get install -y python3-tk

      - name: ruff — linting
        run: ruff check logitrack/ tests/

      - name: black — formato
        run: black --check logitrack/ tests/

      - name: pytest — tests + cobertura
        run: |
          python -m pytest tests/ -v \
            --cov=logitrack \
            --cov-report=term-missing \

        env:
          DISPLAY: ""
